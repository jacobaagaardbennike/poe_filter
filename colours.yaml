####################################################################################################
########## Info
####################################################################################################
# Sounds:
# 1 = epic
# 10 = great
# good = 3
# skippable = 16
# 12 = league_mechanics_quest

# black_blue: &abekat [56, 71, 93] #38475D
# gold_light: &abekat [235, 212, 169] #EBD4A9
# brown_parchment: &abekat [208, 192, 173] #D0C0AD
# green_eye: &green_eye [15, 115, 33] #0F7321

color_codes:
  light_silver: &light_silver [235, 240, 248] #EBF0F8
  red_bright_demon: &red_bright_demon [235, 77, 79] #EB4D4F
  red_rich: &red_rich [146, 29, 41] #921D29
  red_dark: &red_dark [107, 6, 20] #6B0614
  black_rich: &black_rich [35, 35, 45] #23232D
  blue_demon: &blue_demon [29, 193, 192] #1DC1C0
  brown_red: &brown_red [90, 68, 67] #5A4443
  yellow_rare_loot: &yellow_rare_loot [238, 195, 17] #EEC311

sets:
  - name: epic_purple_settings
    font_size: 45
    colors:
      color_text: *red_rich
      color_border: *red_rich
      color_background: *light_silver
    alert_sound: [1, 300]
    effect: "Purple"
    minimap_icon: [0, "Purple"]

  - name: epic_red_settings
    font_size: 45
    colors:
      color_text: *red_rich
      color_border: *red_rich
      color_background: *light_silver
    alert_sound: [1, 300]
    effect: "Red"
    minimap_icon: [0, "Red"]

  - name: great_settings
    font_size: 45
    colors:
      color_text: *light_silver
      color_border: *light_silver
      color_background: *red_rich
    alert_sound: [10, 300]
    effect: "Red"
    minimap_icon: [0, "Red"]

  - name: good_settings
    font_size: 45
    colors:
      color_text: *light_silver
      color_border: *light_silver
      color_background: *red_dark
    alert_sound: [3, 300]
    effect: "White"
    minimap_icon: [1, "White"]

  - name: skippable_settings
    font_size: 40
    colors:
      color_text: *light_silver
      color_border: *red_rich
      color_background: *black_rich
    alert_sound: [16, 300]
    effect: "Grey"
    minimap_icon: [2, "Grey"]

  - name: unique_settings
    font_size: 45
    colors:
      color_text: *black_rich
      color_border: *light_silver
      color_background: *brown_red
    alert_sound: [3, 300]
    effect: "Brown"
    minimap_icon: [1, "Brown"]

  - name: league_mechanics_quest
    font_size: 45
    colors:
      color_text: *light_silver
      color_border: *red_rich
      color_background: *blue_demon
    alert_sound: [12, 300]
    effect: "Cyan"
    minimap_icon: [1, "Cyan"]

  - name: rare_loot_settings
    font_size: 45
    colors:
      color_text: *yellow_rare_loot
      color_border: *yellow_rare_loot
      color_background: *black_rich
    alert_sound: [3, 300]
    effect: "White"
    minimap_icon: [2, "White"]

  # specials
  - name: build_loot_settings
    font_size: 45
    colors:
      color_text: *yellow_rare_loot
      color_border: *yellow_rare_loot
      color_background: *black_rich
    alert_sound: [10, 300]
    effect: "Pink"
    minimap_icon: 01, "Pink"]

  - name: epic_mirror_of_malandra
    font_size: 45
    colors:
      color_text: *red_rich
      color_border: *red_rich
      color_background: *light_silver
    alert_sound: "ShMirror 300"
    effect: "Red"
    minimap_icon: [0, "Red"]

  - name: epic_divine_orb
    font_size: 45
    colors:
      color_text: *red_rich
      color_border: *red_rich
      color_background: *light_silver
    alert_sound: "ShDivine 300"
    effect: "Red"
    minimap_icon: [0, "Red"]

  - name: great_exalted_orb
    font_size: 45
    colors:
      color_text: *red_rich
      color_border: *red_rich
      color_background: *light_silver
    alert_sound: "ShExalted 300"
    effect: "Red"
    minimap_icon: [0, "Red"]
