color_codes:
  diarrhea_yellow: &diarrhea_yellow [210, 158, 9]
  white: &white [255, 255, 255]

sets:
  - name: special_loot
    colors:
      color_text: *diarrhea_yellow # Reuse diarrhea_yellow color
      color_border: *diarrhea_yellow # Reuse diarrhea_yellow color
      color_background: *white # Reuse white color
    alert_sound: [1, 300]
    effect: "Pink"
    minimap_icon: ["Pink", "Triangle"]

  - name: league_mechanics_and_quest_items
    colors:
      color_text: *white # Reuse white color
      color_border: *white # Reuse white color
      color_background: *white # Reuse white color
    alert_sound: [2, 500]
    effect: "Blue"
    minimap_icon: ["Blue", "Circle"]
