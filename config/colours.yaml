color_codes:
  light_silver: &light_silver { r: 235, g: 240, b: 248, hex: "#EBF0F8" }
  red_bright_demon: &red_bright_demon { r: 235, g: 77, b: 79, hex: "#EB4D4F" }
  red_rich: &red_rich { r: 146, g: 29, b: 41, hex: "#921D29" }
  red_dark: &red_dark { r: 107, g: 6, b: 20, hex: "#6B0614" }
  black_rich: &black_rich { r: 35, g: 35, b: 45, hex: "#23232D" }
  blue_demon: &blue_demon { r: 29, g: 193, b: 192, hex: "#1DC1C0" }
  brown_red: &brown_red { r: 90, g: 68, b: 67, hex: "#5A4443" }
  yellow_rare_loot: &yellow_rare_loot { r: 238, g: 195, 17, hex: "#EEC311" }
  icon: &icon "abe"

sets:
  - name: epic_purple_settings
    setting_type: ColourSettings
    colour_options:
      font_size: 45
      text_colour: *red_rich
      border_colour: *red_rich
      background_colour: *light_silver
      alert_sound: [1, 300]
      effect: "Purple"
      minimap_icon:
        size: 0
        colour: "Purple"
        shape: *icon

