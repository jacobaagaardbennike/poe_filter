# Sounds:
# 1 = uber
# 1 = epic
# 12 = league_mechanics_quest
# great = 10
# Good = 3
# Maps = 11
# Skippable = 16

black_rich: &abekat [35, 35, 45] #23232D
black_blue: &abekat [56, 71, 93] #38475D

red_light: &abekat [235, 77, 79] #EB4D4F

red_mid: &abekat [167, 49, 76] #A7314C

red_dark: &abekat [125, 23, 37] #7D1725
red_darker: &abekat [107, 6, 20] #6B0614
red_darkest: &abekat [92, 3, 20] #5C0314


red_brown: &abekat [152, 63, 61] #983F3D

silver_light: &abekat [235, 240, 248] #EBF0F8
gold_light: &abekat [235, 212, 169] #EBD4A9
brown_parchment: &abekat [208, 192, 173] #D0C0AD

blue_demon: &abekat [29, 193, 192] #1DC1C0
green_eye: &abekat [15, 115, 33] #0F7321

orange: &abekat [232, 118, 55] #E87637
yellow: &abekat [238, 195, 17] #EEC311

color_codes:
  white_royal: &white_royal [255, 255, 250] #FFFFFA


sets:
  - name: uber_settings
    font_size: 45
    colors:
      color_text: *pink_emperors_children
      color_border: *pink_emperors_children
      color_background: *white_royal
    alert_sound: [1, 300]
    effect: "Pink"
    minimap_icon: [0, "Pink"]

  - name: epic_settings
    font_size: 45
    colors:
      color_text: *purple_phoenician
      color_border: *purple_phoenician
      color_background: *white_royal
    alert_sound: [1, 300]
    effect: "Purple"
    minimap_icon: [0, "Purple"]

  - name: league_mechanics_quest
    font_size: 45
    colors:
      color_text: *white_royal
      color_border: *white_royal
      color_background: *green_royal
    alert_sound: [12, 300]
    effect: "Green"
    minimap_icon: [1, "Green"]

  - name: great_settings
    font_size: 45
    colors:
      color_text: *white_royal
      color_border: *white_royal
      color_background: *green_royal
    alert_sound: [12, 300]
    effect: "Green"
    minimap_icon: [1, "Green"]






  - name: epic_mirror_of_malandra
    font_size: 45
    colors:
      color_text: *purple_phoenician
      color_border: *purple_phoenician
      color_background: *white_royal
