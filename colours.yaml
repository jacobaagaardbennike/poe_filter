# Define reusable RGB color codes as anchors
color_codes:
  diarrhea_yellow: &diarrhea_yellow [210, 158, 9] # diarrhea yellow: #D29E09
  white: &white [255, 255, 255] # Background color (RGB)
  abens_farve: &abens_farve [255, 255, 255] # Background color (RGB)

assigned_colours:
  special_loot_text: &special_loot_text *diarrhea_yellow
  special_loot_border: &special_loot_border *diarrhea_yellow
  special_loot_background: &special_loot_background *white

  league_mechanics_and_quest_items_text: &league_mechanics_and_quest_items_text *abens_farve
  league_mechanics_and_quest_items_border: &league_mechanics_and_quest_items_border *abens_farve
  league_mechanics_and_quest_items_background: &league_mechanics_and_quest_items_background *white

sets:
  - name: special_loot
    color_text: *special_loot_text # Reference the text color anchor
    color_border: *special_loot_border # Reference the border color anchor
    color_background: *special_loot_background # Reference the background color anchor
    alert_sound: [1, 300] # Alert sound (ID, Volume)
    effect: "Pink" # Effect
    minimap_icon: ["Pink", "Triangle"] # Minimap icon (Color, Shape)

  - name: league_mechanics_and_quest_items
    color_text: *league_mechanics_and_quest_items_text # Reference the text color anchor
    color_border: *league_mechanics_and_quest_items_border # Reference the border color anchor
    color_background: *league_mechanics_and_quest_items_background # Reference the background color anchor
    alert_sound: [2, 500] # Alert sound (ID, Volume)
    effect: "Blue" # Effect
    minimap_icon: ["Blue", "Circle"] # Minimap icon (Color, Shape)
